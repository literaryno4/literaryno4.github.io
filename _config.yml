# ═══════════════════════════════════════════════════════
# 文学第四 — Site Configuration
# ═══════════════════════════════════════════════════════

# Site settings
title: 文学第四
description: >-
  技术与思考的记录。涵盖 C++、操作系统、机器学习、网络编程等。
url: "https://literaryno4.github.io"
lang: zh-cmn-Hans

# Build settings
# theme: minima
plugins:
  - jekyll-feed
  - jekyll-seo-tag

# Global permalink
permalink: /:title:output_ext/

markdown: kramdown

# Show excerpts on homepage
show_excerpts: false

# Date format
minima:
  date_format: "%Y-%m-%d"

# Exclude from processing
exclude:
  - .sass-cache/
  - .jekyll-cache/
  - Gemfile
  - Gemfile.lock
  - node_modules/
  - vendor/
  - assets/main2.css.bak
  - README.md
